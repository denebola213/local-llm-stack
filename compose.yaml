services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    restart: unless-stopped
    environment:
      LD_LIBRARY_PATH: "/app"
      HF_TOKEN: ""
      XDG_CACHE_HOME: "/data/.cache"
    ports:
      - "8080:8080"
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ./data/llama-server:/data
      - ./models.ini:/models/models.ini:ro
    security_opt:
      - label=disable
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --timeout
      - "1200"
      - --models-preset
      - /models/models.ini
      - --models-max
      - "0"
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1F90 ' /proc/net/tcp || grep -q ':1F90 ' /proc/net/tcp6"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

  searxng:
    image: ghcr.io/searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - ./data/searxng-limits:/etc/searxng
    environment:
      SEARXNG_BASE_URL: "http://searxng:8080/"
      UWSGI_WORKERS: "1"
      UWSGI_THREADS: "4"
    security_opt:
      - label=disable

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    depends_on:
      llama-server:
        condition: service_healthy
      searxng:
        condition: service_started
    ports:
      - "3000:8080"
    volumes:
      - ./data/open-webui:/app/backend/data
    environment:
      ENABLE_OLLAMA_API: "False"
      ENABLE_OPENAI_API: "True"
      OPENAI_API_BASE_URLS: "http://llama-server:8080/v1"
      OPENAI_API_KEYS: "sk-local"
      AIOHTTP_CLIENT_TIMEOUT: "900"
      WEBUI_SECRET_KEY: "replace-this-secret"
      ENABLE_WEB_SEARCH: True
      WEB_SEARCH_ENGINE: "searxng"
      WEB_SEARCH_RESULT_COUNT: 3
      WEB_SEARCH_CONCURRENT_REQUESTS: 10
      SEARXNG_QUERY_URL: "http://searxng:8080/search?q=<query>"
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1F90 ' /proc/net/tcp || grep -q ':1F90 ' /proc/net/tcp6"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  cloudflared:
    image: docker.io/cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
